# Divination Scenario - Domain Configuration
# 玄学占卜助手场景的领域元数据配置
#
# 本文件定义：
# - [meta]: 场景元数据，用于 LLM-1 的 scenarioBriefs 构建
# - [routing]: 路由关键词，辅助意图判定
# - [dimensions]: 业务维度定义（多种占卜体系）
# - [consistency]: 跨维度一致性规则（矛盾处理策略）
# - [output_expectations]: 期望产出格式
#
# 设计理念：
# 本场景整合东西方多种占卜体系，对同一问题提供多维度解读。
# 当不同体系的结论相互矛盾时，采用「天机不可泄露」的神秘化处理，
# 让用户感受命运的多元性和不可测性。

# =============================================================================
# 场景元数据
# =============================================================================

[meta]
id = "divination"
name = "玄学占卜助手"
description = "融合东西方神秘学智慧，为您提供多维度的命运解读。涵盖中国传统命理（八字、紫微斗数、易经）、西方星相（星座、塔罗牌）、以及数字命理等体系。多种占卜视角交叉印证，揭示命运的不同面向。"
version = "1.0.0"

# 场景特性声明
[meta.features]
multi_dimension = true              # 多维度并行解读
contradiction_handling = "mystical" # 矛盾处理方式：神秘化
result_integration = "comparative"  # 结果整合方式：对比呈现

# =============================================================================
# 路由配置
# =============================================================================

[routing]
keywords = [
    # 通用占卜词
    "占卜",
    "算命",
    "算卦",
    "预测",
    "命运",
    "运势",
    "运程",
    "吉凶",
    "测算",
    "推算",
    "卜卦",
    "问卦",
    "求签",
    "解签",
    "看相",
    "批命",

    # 中国传统
    "八字",
    "四柱",
    "生辰",
    "紫微斗数",
    "紫微",
    "斗数",
    "易经",
    "周易",
    "六爻",
    "梅花易数",
    "奇门遁甲",
    "风水",
    "面相",
    "手相",
    "姓名学",
    "五行",
    "天干地支",
    "黄历",
    "老黄历",

    # 西方星相
    "星座",
    "星盘",
    "占星",
    "星象",
    "塔罗",
    "塔罗牌",
    "水星逆行",
    "水逆",
    "上升星座",
    "月亮星座",
    "太阳星座",
    "本命盘",
    "行运",

    # 数字命理
    "数字命理",
    "生命数字",
    "幸运数字",
    "灵数",

    # 其他
    "水晶球",
    "灵摆",
    "通灵",
    "前世",
    "今生",
    "来世",
    "姻缘",
    "桃花",
    "财运",
    "事业运",
    "健康运",
    "贵人",
    "小人",
    "流年",
    "大运",
    "本命年",
]

# =============================================================================
# 业务维度定义
# =============================================================================
# 每个维度代表一种占卜体系，各自独立解读，最后整合

[dimensions.bazi]
name = "八字命理"
description = "中国传统四柱八字命理，根据出生年月日时的天干地支组合，推算人生格局、运势起伏和吉凶祸福。"

[dimensions.ziwei]
name = "紫微斗数"
description = "源自唐代的星命学，以紫微星为主星，排布十二宫位，解读人生各领域的命运走向。"

[dimensions.yijing]
name = "易经占卜"
description = "源自《周易》的古老占卜术，通过卦象变化揭示事物发展规律和趋势。"


[dimensions.astrology]
name = "西方占星"
description = "基于出生时刻的行星位置和星座配置，解读性格特质、人生议题和运势周期。"

[dimensions.tarot]
name = "塔罗牌占卜"
description = "源自欧洲的神秘牌卡占卜术，通过牌阵解读当前处境、潜在影响和未来趋势。"

[dimensions.numerology]
name = "数字命理"
description = "基于生日、姓名等数字的神秘解读，揭示生命密码和人生使命。"

# =============================================================================
# Partner 映射
# =============================================================================
# 维度到 Partner 的静态映射。每个维度对应一个 Partner AIC 数组。
# 注意：占卜场景目前没有配置 Partner，各维度由 Leader 直接处理。

[partners.mapping]
bazi = []       # TODO: 八字命理智能体
ziwei = []      # TODO: 紫微斗数智能体
yijing = []     # TODO: 易经占卜智能体
astrology = []  # TODO: 西方占星智能体
tarot = []      # TODO: 塔罗牌智能体
numerology = [] # TODO: 数字命理智能体

# =============================================================================
# 矛盾处理策略
# =============================================================================
# 当不同维度的解读出现矛盾时的处理方式

[consistency]
# 矛盾处理原则
contradiction_policy = "mystical_acceptance"

# 矛盾呈现模板
contradiction_templates = [
    "东方命理与西方星象在此处呈现不同视角，正如阴阳两面，各有其理。天机深邃，非凡人所能尽窥。",
    "诸家论断于此分歧，恰似条条大路通罗马，命运的奥秘本就多元。请君自行体悟。",
    "八字与星盘在此各执一词，此乃命运的多重可能性。天机不可尽泄，且看因缘际会。",
    "古今中外的智慧在此交汇，呈现不同面向。命运如迷雾中的灯塔，每盏灯照亮一个方向。",
    "不同体系各有所见，正如盲人摸象，各得其真。综合参考，方见全貌。",
]

# 和谐呈现模板
harmony_templates = ["东西方智慧在此不谋而合，可见此事确有定数。", "诸家论断一致，天意昭然。", "多维印证，此乃命中注定。"]
