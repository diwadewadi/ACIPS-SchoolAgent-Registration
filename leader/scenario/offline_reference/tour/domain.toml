# Tour Scenario - Domain Configuration
# 旅游助手场景的领域元数据配置
#
# 本文件定义：
# - [meta]: 场景元数据，用于 LLM-1 的 scenarioBriefs 构建
# - [routing]: 路由关键词，辅助意图判定
# - [dimensions]: 业务维度定义，用于 LLM-2 的维度拆解
# - [partners]: Partner 映射配置
# - [consistency]: 跨维度一致性规则

# =============================================================================
# 场景元数据
# =============================================================================
# 这些信息会被加载到 Session.scenarioBriefs，用于 LLM-1 的意图判定

[meta]
id = "tour"
name = "旅游助手"
description = "综合旅游规划服务，帮助用户规划国内外旅游行程，涵盖住宿预订、餐饮推荐、交通规划和景点安排。支持多城市行程规划。"
version = "3.0.0"

# =============================================================================
# 路由配置
# =============================================================================
# keywords 用于辅助 LLM-1 判断用户输入是否匹配本场景

[routing]
# 旅游相关关键词
keywords = [
    # 通用旅游词汇
    "旅游",
    "旅行",
    "出游",
    "游玩",
    "度假",
    "行程",
    "规划",
    "安排",
    "计划",
    "自由行",
    "跟团",
    "自驾游",
    # 住宿相关
    "酒店",
    "住宿",
    "宾馆",
    "民宿",
    "订房",
    "住哪里",
    # 餐饮相关
    "餐厅",
    "美食",
    "吃饭",
    "小吃",
    "餐饮",
    "特色菜",
    "当地美食",
    # 景点相关
    "景点",
    "景区",
    "游览",
    "观光",
    "打卡",
    "必去",
    "网红景点",
    # 城际交通相关
    "机票",
    "火车票",
    "高铁",
    "动车",
    "飞机",
    "长途汽车",
    "城际",
    # 市内交通相关
    "交通",
    "出行",
    "路线",
    "怎么去",
    "地铁",
    "公交",
    "打车",
    "租车",
    "网约车",
]

# =============================================================================
# 业务维度定义
# =============================================================================
# 用于 LLM-2 的维度拆解。每个维度只包含 name 和 description。

[dimensions.hotel]
name = "住宿"
description = "酒店发现、筛选、价格比较与预订建议。支持各类住宿场景（商务、亲子、度假、经济型等）。"

[dimensions.food]
name = "餐饮"
description = "当地特色餐厅和美食推荐。涵盖各地传统美食、网红餐厅、位置匹配推荐、口味偏好匹配等。"

[dimensions.intercity_transport]
name = "城际交通"
description = "城市之间的交通规划与出行建议。包括火车（高铁/动车/普快）、飞机、长途汽车、自驾等城际出行方式的路线规划、时刻查询和票务建议。"

[dimensions.local_transport]
name = "市内交通"
description = "城市内部的交通规划与出行建议。包括地铁、公交、出租车、网约车、共享单车、租车自驾等市内出行方式的路线规划和换乘建议。"

[dimensions.attraction]
name = "景点"
description = "景点推荐与游览安排。涵盖自然景观、人文历史、主题乐园、网红打卡地等各类景点，以及游览路线规划。"

# =============================================================================
# Partner 静态映射
# =============================================================================
# 维度到 Partner 的静态映射。每个维度对应一个 ACS 文件名数组。
# ACS 文件存放在场景目录下（如 scenario/expert/tour/*.json）
# 某个维度静态映射的配置缺失或文件加载失败后，该维度会执行动态发现。

[partners.static_mapping]
hotel = ["china_hotel.json"] # 全国酒店预订智能体
intercity_transport = ["china_transport.json"] # 全国交通规划智能体
food = ["beijing_food.json"] # 北京美食推荐智能体
local_transport = [ # 市内交通（北京）
    "beijing_urban.json", # 北京城区出行智能体
    "beijing_rural.json", # 北京郊区出行智能体
]
attraction = [ # 景点推荐（北京）
    "beijing_urban.json", # 北京城区景点智能体
    "beijing_rural.json", # 北京郊区景点智能体
]

# =============================================================================
# 跨维度一致性规则
# =============================================================================
# 供 LLM-5 和 LLM-6 使用，用于检测冲突和整合结果

[consistency]
rules = [
    "酒店位置应与用户的主要活动区域（景点/商圈）相匹配，交通便利为佳",
    "餐厅推荐应考虑与当日酒店/景点的距离，避免用餐需要长途跋涉",
    "行程时间安排应合理，避免同一天安排距离过远的多个景点",
    "总预算需控制在用户给定范围内，各维度预算分配应合理",
    "行程节奏应考虑出行人员构成（如带儿童/老人时需降低密度）",
    "跨城市行程需考虑交通时间，预留足够的中转时间",
]
