[pytest]
# Integration 测试默认并行执行
# 使用 pytest-xdist 自动检测 CPU 核心数
addopts = -n auto

# 自定义 markers
markers =
    integration: marks tests as integration tests (may require LLM API)
    unit: marks tests as unit tests (no external dependencies)
    e2e: marks tests as end-to-end tests (requires running services)
    slow: marks tests as slow running

# 异步测试模式
asyncio_mode = auto
