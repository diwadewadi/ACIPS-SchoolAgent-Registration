[pytest]
# Leader 测试配置
# 各目录有独立的 pytest.ini 定义默认执行模式：
#   - unit/pytest.ini: addopts = -n 0 (串行)
#   - integration/pytest.ini: addopts = -n auto (并行)
#   - e2e/pytest.ini: addopts = -n 0 (串行)

# 测试路径
testpaths = integration unit e2e

# 标记定义
markers =
    integration: Integration tests (may call real APIs)
    unit: Unit tests (mocked, fast)
    e2e: End-to-end tests (require running services)
    slow: Slow tests

# 异步模式
asyncio_mode = auto

# 默认选项（不包含 -n，由各目录自行定义）
addopts = -v --tb=short

# pytest-xdist 配置说明：
# -n auto: 自动检测CPU核心数并行执行
# -n 4: 使用4个worker并行执行
# -n 0: 串行执行（禁用并行）
# --dist=loadfile: 同一文件的测试在同一worker执行（适合有module级fixture的情况）
# --dist=load: 按测试数量均匀分配（默认，最大并行度）
