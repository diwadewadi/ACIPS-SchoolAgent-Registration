[pytest]
# 自定义 markers
markers =
    integration: marks tests as integration tests (may require LLM API)
    unit: marks tests as unit tests (no external dependencies)
    e2e: marks tests as end-to-end tests (requires running Partner service)

# 默认并行执行（用于 integration 测试）
# 使用 -n auto 自动检测 CPU 核心数
# 使用 -n 0 禁用并行（用于 e2e 测试）
addopts = -v

# 测试文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试模式
asyncio_mode = auto
